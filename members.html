<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StokvelOS — Members</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body>

<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main-content">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;">
      <h1 class="page-title">Members</h1>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Member</button>
    </div>

    <div class="page-body">
      <div class="card">
        <div class="card-header">
          <span class="card-title">All Members</span>
          <input type="text" class="form-input" id="search-input" placeholder="Search members…" style="width:220px;padding:7px 12px;font-size:0.8rem;" oninput="renderTable()" />
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Monthly (R)</th>
                <th>Payout Pos.</th>
                <th>Paid This Year</th>
                <th>This Month</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="members-tbody">
              <tr><td colspan="9"><div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">No members yet</div><div class="empty-sub">Click "Add Member" to get started.</div></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="member-modal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Add Member</span>
      <button class="btn btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id" />
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input type="text" class="form-input" id="m-name" placeholder="e.g. Zanele Dlamini" />
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-input" id="m-phone" placeholder="e.g. 0821234567" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Monthly Contribution (R)</label>
          <input type="number" class="form-input" id="m-amount" placeholder="Leave blank to use default" min="0" />
        </div>
        <div class="form-group">
          <label class="form-label">Payout Position</label>
          <input type="number" class="form-input" id="m-payout" placeholder="e.g. 1" min="1" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="m-status">
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveMember()">Save Member</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
  requireSetup();
  document.getElementById('sidebar').innerHTML = renderNav();
  highlightNav();

  const cfg = Config.get();

  function renderTable() {
    const search = document.getElementById('search-input').value.toLowerCase();
    let members = Members.all();
    if (search) members = members.filter(m => m.name.toLowerCase().includes(search) || (m.phone || '').includes(search));

    const tbody = document.getElementById('members-tbody');
    if (!members.length) {
      tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">No members found</div></div></td></tr>`;
      return;
    }

    members.sort((a, b) => (a.payoutPosition || 99) - (b.payoutPosition || 99));

    tbody.innerHTML = members.map((m, i) => {
      const allContribs = Contributions.forMember(m.id);
      const thisYear = allContribs.filter(c => new Date(c.date).getFullYear() === new Date().getFullYear() && c.status === 'confirmed');
      const monthlyAmt = m.monthlyAmount || cfg.monthlyAmount || 0;
      const monthStatus = memberPaymentStatus(m.id);

      return `<tr>
        <td style="font-family:var(--font-mono);color:var(--text-muted);font-size:0.78rem;">${i + 1}</td>
        <td style="font-weight:500;">${m.name}</td>
        <td style="font-family:var(--font-mono);font-size:0.78rem;">${m.phone || '—'}</td>
        <td style="font-family:var(--font-mono);">${fmt.currency(monthlyAmt)}</td>
        <td style="text-align:center;font-family:var(--font-mono);">${m.payoutPosition || '—'}</td>
        <td style="font-family:var(--font-mono);font-size:0.78rem;">
          ${fmt.currency(thisYear.reduce((s, c) => s + Number(c.amount), 0))}
          <span style="color:var(--text-muted)"> / ${fmt.currency(monthlyAmt * 12)}</span>
        </td>
        <td><span class="badge badge-${monthStatus}">${monthStatus}</span></td>
        <td><span class="badge badge-${m.status}">${m.status}</span></td>
        <td>
          <div style="display:flex;gap:4px;">
            <button class="btn btn-ghost btn-sm" onclick="editMember('${m.id}')">Edit</button>
            <button class="btn btn-ghost btn-sm" style="color:#dc2626;" onclick="removeMember('${m.id}','${m.name}')">✕</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  function openAddModal() {
    document.getElementById('modal-title').textContent = 'Add Member';
    document.getElementById('edit-id').value = '';
    document.getElementById('m-name').value = '';
    document.getElementById('m-phone').value = '';
    document.getElementById('m-amount').value = '';
    document.getElementById('m-payout').value = Members.all().length + 1;
    document.getElementById('m-status').value = 'active';
    showModal();
  }

  function editMember(id) {
    const m = Members.get(id);
    if (!m) return;
    document.getElementById('modal-title').textContent = 'Edit Member';
    document.getElementById('edit-id').value = id;
    document.getElementById('m-name').value = m.name;
    document.getElementById('m-phone').value = m.phone || '';
    document.getElementById('m-amount').value = m.monthlyAmount || '';
    document.getElementById('m-payout').value = m.payoutPosition || '';
    document.getElementById('m-status').value = m.status;
    showModal();
  }

  function saveMember() {
    const name = document.getElementById('m-name').value.trim();
    if (!name) { toast('Please enter a name.', 'error'); return; }

    const data = {
      name,
      phone: document.getElementById('m-phone').value.trim(),
      monthlyAmount: Number(document.getElementById('m-amount').value) || cfg.monthlyAmount || 0,
      payoutPosition: Number(document.getElementById('m-payout').value) || null,
      status: document.getElementById('m-status').value,
    };

    const editId = document.getElementById('edit-id').value;
    if (editId) {
      Members.update(editId, data);
      toast('Member updated.');
    } else {
      Members.add(data);
      toast('Member added!');
    }

    closeModal();
    renderTable();
  }

  function removeMember(id, name) {
    if (!confirm(`Remove ${name} from the stokvel? Their contribution records will remain.`)) return;
    Members.remove(id);
    toast('Member removed.');
    renderTable();
  }

  function showModal() {
    const m = document.getElementById('member-modal');
    m.style.display = 'flex';
    setTimeout(() => m.classList.add('show'), 10);
  }

  function closeModal() {
    const m = document.getElementById('member-modal');
    m.classList.remove('show');
    setTimeout(() => m.style.display = 'none', 200);
  }

  document.getElementById('member-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('member-modal')) closeModal();
  });

  renderTable();
</script>
</body>
</html>
