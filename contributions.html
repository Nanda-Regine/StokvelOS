<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StokvelOS — Contributions</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .cal-wrap { padding: 20px; }
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .cal-month-label {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--green-deep);
    }
    .payment-method-row {
      display: flex; gap: 8px; margin-bottom: 18px;
    }
    .method-btn {
      flex: 1; padding: 9px; border: 1px solid var(--border);
      border-radius: var(--radius); text-align: center;
      font-family: var(--font-mono); font-size: 0.7rem;
      cursor: pointer; background: white; transition: all 0.2s;
      color: var(--text-mid);
    }
    .method-btn:hover { border-color: var(--green-mid); }
    .method-btn.selected { border-color: var(--gold); background: rgba(202,138,4,0.06); color: var(--green-deep); }
  </style>
</head>
<body>

<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main-content">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;">
      <h1 class="page-title">Contributions</h1>
      <button class="btn btn-primary" onclick="openPaymentModal()">+ Record Payment</button>
    </div>

    <div class="page-body">
      <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:20px;align-items:start;">

        <!-- CALENDAR -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Monthly View</span>
          </div>
          <div class="cal-wrap">
            <div class="cal-nav">
              <button class="btn btn-ghost btn-sm" onclick="prevMonth()">←</button>
              <span class="cal-month-label" id="cal-label"></span>
              <button class="btn btn-ghost btn-sm" onclick="nextMonth()">→</button>
            </div>
            <div class="cal-grid" id="cal-grid">
              <div class="cal-header">Mon</div>
              <div class="cal-header">Tue</div>
              <div class="cal-header">Wed</div>
              <div class="cal-header">Thu</div>
              <div class="cal-header">Fri</div>
              <div class="cal-header">Sat</div>
              <div class="cal-header">Sun</div>
            </div>
          </div>

          <!-- Monthly totals -->
          <div style="padding:0 20px 20px;">
            <div style="border-top:1px solid var(--border);padding-top:16px;">
              <div style="font-family:var(--font-mono);font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;">Monthly Summary</div>
              <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
                <span style="font-size:0.875rem;">Confirmed</span>
                <span style="font-family:var(--font-mono);font-weight:500;color:var(--green-mid);" id="summary-confirmed">R0</span>
              </div>
              <div style="display:flex;justify-content:space-between;">
                <span style="font-size:0.875rem;">Pending</span>
                <span style="font-family:var(--font-mono);font-weight:500;color:#854d0e;" id="summary-pending">R0</span>
              </div>
            </div>
          </div>
        </div>

        <!-- CONTRIBUTIONS TABLE -->
        <div class="card">
          <div class="card-header">
            <span class="card-title" id="table-heading">All Contributions</span>
            <button class="btn btn-outline btn-sm" onclick="exportCSV()">Export CSV</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Member</th>
                  <th>Amount</th>
                  <th>Date</th>
                  <th>Method</th>
                  <th>Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="contrib-tbody"></tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>

<!-- PAYMENT MODAL -->
<div class="modal-overlay" id="payment-modal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Record Payment</span>
      <button class="btn btn-ghost" onclick="closePaymentModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Member *</label>
        <select class="form-select" id="p-member"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Amount (R) *</label>
          <input type="number" class="form-input" id="p-amount" min="1" />
        </div>
        <div class="form-group">
          <label class="form-label">Date *</label>
          <input type="date" class="form-input" id="p-date" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Payment Method</label>
        <div class="payment-method-row">
          <div class="method-btn selected" data-method="Cash" onclick="selectMethod(this)">💵 Cash</div>
          <div class="method-btn" data-method="EFT" onclick="selectMethod(this)">🏦 EFT</div>
          <div class="method-btn" data-method="Card" onclick="selectMethod(this)">💳 Card</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="p-status">
          <option value="confirmed">Confirmed</option>
          <option value="pending">Pending</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closePaymentModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePayment()">Record Payment</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
  requireSetup();
  document.getElementById('sidebar').innerHTML = renderNav();
  highlightNav();

  const cfg = Config.get();
  let selectedMethod = 'Cash';
  let viewDate = new Date();

  function selectMethod(el) {
    document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedMethod = el.dataset.method;
  }

  function renderCalendar() {
    const year = viewDate.getFullYear();
    const month = viewDate.getMonth();
    document.getElementById('cal-label').textContent = new Date(year, month, 1).toLocaleDateString('en-ZA', { month: 'long', year: 'numeric' });

    const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();
    const monthContribs = Contributions.all().filter(c => {
      const d = new Date(c.date);
      return d.getMonth() === month && d.getFullYear() === year;
    });
    const daysWithPayments = new Set(monthContribs.map(c => new Date(c.date).getDate()));

    const grid = document.getElementById('cal-grid');
    // remove existing day cells
    grid.querySelectorAll('.cal-day,.cal-empty-cell').forEach(el => el.remove());

    // offset: Mon=0 ... Sun=6
    const offset = (firstDay === 0 ? 6 : firstDay - 1);
    for (let i = 0; i < offset; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day empty cal-empty-cell';
      grid.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const el = document.createElement('div');
      el.className = 'cal-day';
      el.textContent = d;
      const isToday = today.getDate() === d && today.getMonth() === month && today.getFullYear() === year;
      if (isToday) el.classList.add('today');
      if (daysWithPayments.has(d)) el.classList.add('has-payment');
      grid.appendChild(el);
    }

    // Summary
    const confirmed = monthContribs.filter(c => c.status === 'confirmed').reduce((s, c) => s + Number(c.amount), 0);
    const pending = monthContribs.filter(c => c.status === 'pending').reduce((s, c) => s + Number(c.amount), 0);
    document.getElementById('summary-confirmed').textContent = fmt.currency(confirmed);
    document.getElementById('summary-pending').textContent = fmt.currency(pending);
  }

  function prevMonth() { viewDate.setMonth(viewDate.getMonth() - 1); renderCalendar(); }
  function nextMonth() { viewDate.setMonth(viewDate.getMonth() + 1); renderCalendar(); }

  function renderTable() {
    const contribs = [...Contributions.all()].sort((a, b) => new Date(b.date) - new Date(a.date));
    const tbody = document.getElementById('contrib-tbody');

    if (!contribs.length) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">💰</div><div class="empty-title">No contributions recorded</div><div class="empty-sub">Click "Record Payment" to add one.</div></div></td></tr>`;
      return;
    }

    tbody.innerHTML = contribs.map(c => {
      const member = Members.get(c.memberId);
      return `<tr>
        <td style="font-weight:500;">${member?.name || 'Unknown'}</td>
        <td style="font-family:var(--font-mono);">${fmt.currency(c.amount)}</td>
        <td style="font-family:var(--font-mono);font-size:0.78rem;">${fmt.date(c.date)}</td>
        <td><span style="font-family:var(--font-mono);font-size:0.72rem;">${c.method || 'Cash'}</span></td>
        <td>
          <select class="form-select" style="padding:4px 8px;font-size:0.72rem;width:auto;" onchange="updateStatus('${c.id}',this.value)">
            <option ${c.status === 'confirmed' ? 'selected' : ''}>confirmed</option>
            <option ${c.status === 'pending' ? 'selected' : ''}>pending</option>
          </select>
        </td>
        <td><button class="btn btn-ghost btn-sm" style="color:#dc2626;" onclick="deleteContrib('${c.id}')">✕</button></td>
      </tr>`;
    }).join('');
  }

  function openPaymentModal() {
    const members = Members.all().filter(m => m.status === 'active');
    const select = document.getElementById('p-member');
    select.innerHTML = members.length
      ? members.map(m => `<option value="${m.id}">${m.name}</option>`).join('')
      : '<option value="">No active members</option>';
    document.getElementById('p-amount').value = cfg.monthlyAmount || '';
    document.getElementById('p-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('p-status').value = 'confirmed';

    const modal = document.getElementById('payment-modal');
    modal.style.display = 'flex';
    setTimeout(() => modal.classList.add('show'), 10);
  }

  function closePaymentModal() {
    const modal = document.getElementById('payment-modal');
    modal.classList.remove('show');
    setTimeout(() => modal.style.display = 'none', 200);
  }

  function savePayment() {
    const memberId = document.getElementById('p-member').value;
    const amount = document.getElementById('p-amount').value;
    const date = document.getElementById('p-date').value;
    if (!memberId || !amount || !date) { toast('Please fill in all required fields.', 'error'); return; }

    Contributions.add({
      memberId,
      amount: Number(amount),
      date,
      method: selectedMethod,
      status: document.getElementById('p-status').value,
    });

    toast('Payment recorded!');
    closePaymentModal();
    renderCalendar();
    renderTable();
  }

  function updateStatus(id, status) {
    const list = Contributions.all().map(c => c.id === id ? { ...c, status } : c);
    Contributions.save(list);
    renderCalendar();
    toast('Status updated.');
  }

  function deleteContrib(id) {
    if (!confirm('Remove this contribution record?')) return;
    Contributions.save(Contributions.all().filter(c => c.id !== id));
    renderCalendar();
    renderTable();
    toast('Removed.');
  }

  function exportCSV() {
    const rows = [['Member','Amount','Date','Method','Status']];
    Contributions.all().forEach(c => {
      const m = Members.get(c.memberId);
      rows.push([m?.name || 'Unknown', c.amount, c.date, c.method || 'Cash', c.status]);
    });
    const csv = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${(cfg.name || 'stokvel').replace(/\s+/g, '_')}_contributions.csv`;
    a.click();
  }

  document.getElementById('payment-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('payment-modal')) closePaymentModal();
  });

  renderCalendar();
  renderTable();
</script>
</body>
</html>
